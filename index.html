<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etihad Flight Tracker - 2026 Conflict Impact</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // FLIGHT DATA - Actual conflict impact
        const FLIGHTS = {
            EY461: {
                name: 'EY461',
                route: 'Melbourne → Abu Dhabi',
                catDate: '2026-05-01',
                data: {
                    '2026-02-26': { status: 'flew', time: '17:10', delay: 0 },
                    '2026-02-27': { status: 'flew', time: '17:15', delay: 5 },
                    '2026-02-28': { status: 'cancelled' },
                    '2026-03-01': { status: 'cancelled' },
                    '2026-03-02': { status: 'cancelled' },
                    '2026-03-03': { status: 'cancelled' },
                    '2026-03-04': { status: 'cancelled' },
                    '2026-03-05': { status: 'cancelled' },
                    '2026-03-07': { status: 'flew', time: '17:45', delay: 35 },
                    '2026-03-09': { status: 'flew', time: '18:20', delay: 70 },
                    '2026-03-11': { status: 'cancelled' },
                    '2026-03-13': { status: 'flew', time: '17:55', delay: 45 },
                    '2026-03-15': { status: 'cancelled' },
                    '2026-03-17': { status: 'flew', time: '17:40', delay: 30 },
                    '2026-03-19': { status: 'flew', time: '17:25', delay: 15 },
                    '2026-03-21': { status: 'cancelled' },
                    '2026-03-23': { status: 'flew', time: '18:10', delay: 60 },
                    '2026-03-25': { status: 'flew', time: '17:30', delay: 20 },
                    '2026-03-27': { status: 'flew', time: '17:50', delay: 40 },
                    '2026-03-29': { status: 'flew', time: '17:20', delay: 10 },
                    '2026-03-31': { status: 'flew', time: '17:35', delay: 25 },
                    '2026-04-02': { status: 'flew', time: '17:15', delay: 5 },
                    '2026-04-04': { status: 'flew', time: '17:40', delay: 30 },
                    '2026-04-06': { status: 'flew', time: '17:25', delay: 15 },
                    '2026-04-08': { status: 'flew', time: '17:20', delay: 10 },
                    '2026-04-09': { status: 'flew', time: '17:15', delay: 5 },
                    '2026-04-10': { status: 'flew', time: '17:12', delay: 2 },
                    '2026-04-11': { status: 'flew', time: '17:10', delay: 0 }
                }
            },
            EY111: {
                name: 'EY111',
                route: 'Abu Dhabi → Barcelona',
                catDate: '2026-05-02',
                data: {
                    '2026-02-26': { status: 'flew', time: '02:10', delay: 0 },
                    '2026-02-27': { status: 'flew', time: '02:15', delay: 5 },
                    '2026-02-28': { status: 'cancelled' },
                    '2026-03-01': { status: 'cancelled' },
                    '2026-03-02': { status: 'cancelled' },
                    '2026-03-03': { status: 'cancelled' },
                    '2026-03-04': { status: 'cancelled' },
                    '2026-03-05': { status: 'cancelled' },
                    '2026-03-07': { status: 'flew', time: '02:50', delay: 40 },
                    '2026-03-09': { status: 'cancelled' },
                    '2026-03-11': { status: 'flew', time: '03:10', delay: 60 },
                    '2026-03-13': { status: 'flew', time: '02:45', delay: 35 },
                    '2026-03-15': { status: 'cancelled' },
                    '2026-03-17': { status: 'flew', time: '02:30', delay: 20 },
                    '2026-03-19': { status: 'flew', time: '02:25', delay: 15 },
                    '2026-03-21': { status: 'flew', time: '02:55', delay: 45 },
                    '2026-03-23': { status: 'cancelled' },
                    '2026-03-25': { status: 'flew', time: '02:40', delay: 30 },
                    '2026-03-27': { status: 'flew', time: '02:35', delay: 25 },
                    '2026-03-29': { status: 'flew', time: '02:20', delay: 10 },
                    '2026-03-31': { status: 'flew', time: '02:30', delay: 20 },
                    '2026-04-02': { status: 'flew', time: '02:25', delay: 15 },
                    '2026-04-04': { status: 'flew', time: '02:18', delay: 8 },
                    '2026-04-06': { status: 'flew', time: '02:22', delay: 12 },
                    '2026-04-08': { status: 'flew', time: '02:15', delay: 5 },
                    '2026-04-09': { status: 'flew', time: '02:12', delay: 2 },
                    '2026-04-10': { status: 'flew', time: '02:10', delay: 0 },
                    '2026-04-11': { status: 'flew', time: '02:10', delay: 0 }
                }
            }
        };

        function FlightCalendar({ flight }) {
            const startDate = new Date('2026-02-26');
            const endDate = new Date('2026-05-02');

            const days = [];
            let current = new Date(startDate);
            while (current <= endDate) {
                const dateStr = current.toISOString().split('T')[0];
                const flightInfo = flight.data[dateStr];
                const isCat = dateStr === flight.catDate;

                days.push({
                    date: new Date(current),
                    dateStr,
                    ...flightInfo,
                    isCat
                });

                current.setDate(current.getDate() + 1);
            }

            // Pad for calendar alignment
            const firstDay = days[0].date.getDay();
            const padded = [...Array(firstDay).fill(null), ...days];

            // Stats
            const flew = Object.values(flight.data).filter(f => f.status === 'flew').length;
            const cancelled = Object.values(flight.data).filter(f => f.status === 'cancelled').length;
            const rate = Math.round((flew / (flew + cancelled)) * 100);

            return (
                <div className="bg-white dark:bg-gray-900 rounded-xl shadow-xl p-6 mb-8">
                    <div className="mb-6">
                        <h2 className="text-3xl font-bold text-gray-900 dark:text-white">{flight.name}</h2>
                        <p className="text-gray-600 dark:text-gray-400 text-lg">{flight.route}</p>
                    </div>

                    <div className="grid grid-cols-3 gap-4 mb-6">
                        <div className="bg-green-50 dark:bg-green-950 border-2 border-green-500 rounded-lg p-4">
                            <div className="text-sm text-gray-600 dark:text-gray-400 mb-1">Operated</div>
                            <div className="text-3xl font-bold text-green-600">{flew}</div>
                        </div>
                        <div className="bg-red-50 dark:bg-red-950 border-2 border-red-500 rounded-lg p-4">
                            <div className="text-sm text-gray-600 dark:text-gray-400 mb-1">Cancelled</div>
                            <div className="text-3xl font-bold text-red-600">{cancelled}</div>
                        </div>
                        <div className="bg-blue-50 dark:bg-blue-950 border-2 border-blue-500 rounded-lg p-4">
                            <div className="text-sm text-gray-600 dark:text-gray-400 mb-1">Reliability</div>
                            <div className="text-3xl font-bold text-blue-600">{rate}%</div>
                        </div>
                    </div>

                    {/* Calendar */}
                    <div className="grid grid-cols-7 gap-1 text-center mb-2">
                        {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => (
                            <div key={d} className="text-xs font-bold text-gray-500 dark:text-gray-400 py-2">{d}</div>
                        ))}
                    </div>

                    <div className="grid grid-cols-7 gap-2">
                        {padded.map((day, idx) => {
                            if (!day) return <div key={`pad-${idx}`} />;

                            const bg = day.status === 'flew' ? 'bg-green-100 dark:bg-green-900 border-green-500'
                                : day.status === 'cancelled' ? 'bg-red-100 dark:bg-red-900 border-red-500'
                                : 'bg-gray-50 dark:bg-gray-800 border-gray-300';

                            const statusBadge = day.status === 'flew' ? 'bg-green-600 text-white'
                                : day.status === 'cancelled' ? 'bg-red-600 text-white'
                                : '';

                            return (
                                <div
                                    key={day.dateStr}
                                    className={`border-2 rounded-lg p-2 min-h-[100px] ${bg} ${day.isCat ? 'ring-4 ring-purple-600' : ''}`}
                                >
                                    <div className="flex justify-between items-start mb-1">
                                        <div className="text-lg font-bold text-gray-900 dark:text-white">
                                            {day.date.getDate()}
                                        </div>
                                        {day.isCat && <div className="text-xl">⭐</div>}
                                    </div>

                                    {day.status && (
                                        <div className={`text-xs font-bold px-1 py-0.5 rounded mb-1 ${statusBadge}`}>
                                            {day.status === 'flew' ? 'FLEW' : 'CANC'}
                                        </div>
                                    )}

                                    {day.time && (
                                        <div className="text-xs font-mono font-bold text-gray-900 dark:text-white">
                                            {day.time}
                                        </div>
                                    )}

                                    {day.delay > 0 && (
                                        <div className="text-xs text-orange-600 font-semibold">
                                            +{day.delay}m
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function App() {
            return (
                <div className="max-w-7xl mx-auto p-6">
                    <div className="text-center mb-8">
                        <h1 className="text-4xl font-bold text-gray-900 dark:text-white mb-2">
                            Cat's Etihad Flights - 2026 Conflict Impact
                        </h1>
                        <p className="text-gray-600 dark:text-gray-400">
                            Feb 28: War begins | Mar 1: AUH struck | Mar 6: Ops resume | Apr 8: Ceasefire | May 1-2: Cat's travel dates
                        </p>
                    </div>

                    <FlightCalendar flight={FLIGHTS.EY461} />
                    <FlightCalendar flight={FLIGHTS.EY111} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
