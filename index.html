<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat's Etihad Flights - Conflict Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-950 p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const CANCELLATION_REASONS = {

            '2026-03-01': 'AUH airport directly struck by Iranian missiles. Airport closed.',
            '2026-03-02': 'Airport damage assessment ongoing. All flights grounded.',
            '2026-03-03': 'Continued suspension due to ongoing missile attacks on UAE.',
            '2026-03-04': 'Security assessment ongoing. Airport partially operational but Etihad grounded.',
            '2026-03-05': 'Final day of total suspension before limited resumption.',
            '2026-03-09': 'Sporadic cancellation during early recovery period. Limited aircraft/crew availability.',
            '2026-03-11': 'Individual cancellation during gradual service restoration.',
            '2026-03-15': 'Operational constraints during conflict. Limited route capacity.',
            '2026-03-21': 'Crew/aircraft positioning issues during recovery phase.',
            '2026-03-23': 'Individual cancellation during conflict recovery period.'
        };

        const FLIGHTS = {
            '2026-02-26': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:10', delay: 0 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:10', delay: 0 }
            ],
            '2026-02-27': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:15', delay: 5 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:15', delay: 5 }
            ],
            '2026-02-28': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'cancelled' },
                { flight: 'EY111', route: 'AUH→BCN', status: 'cancelled' }
            ],
            '2026-03-01': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'cancelled' },
                { flight: 'EY111', route: 'AUH→BCN', status: 'cancelled' }
            ],
            '2026-03-02': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'cancelled' },
                { flight: 'EY111', route: 'AUH→BCN', status: 'cancelled' }
            ],
            '2026-03-03': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'cancelled' },
                { flight: 'EY111', route: 'AUH→BCN', status: 'cancelled' }
            ],
            '2026-03-04': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'cancelled' },
                { flight: 'EY111', route: 'AUH→BCN', status: 'cancelled' }
            ],
            '2026-03-05': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'cancelled' },
                { flight: 'EY111', route: 'AUH→BCN', status: 'cancelled' }
            ],
            '2026-03-07': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:45', delay: 35 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:50', delay: 40 }
            ],
            '2026-03-09': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '18:20', delay: 70 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'cancelled' }
            ],
            '2026-03-11': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'cancelled' },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '03:10', delay: 60 }
            ],
            '2026-03-13': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:55', delay: 45 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:45', delay: 35 }
            ],
            '2026-03-15': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'cancelled' },
                { flight: 'EY111', route: 'AUH→BCN', status: 'cancelled' }
            ],
            '2026-03-17': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:40', delay: 30 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:30', delay: 20 }
            ],
            '2026-03-19': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:25', delay: 15 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:25', delay: 15 }
            ],
            '2026-03-21': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'cancelled' },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:55', delay: 45 }
            ],
            '2026-03-23': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '18:10', delay: 60 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'cancelled' }
            ],
            '2026-03-25': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:30', delay: 20 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:40', delay: 30 }
            ],
            '2026-03-27': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:50', delay: 40 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:35', delay: 25 }
            ],
            '2026-03-29': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:20', delay: 10 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:20', delay: 10 }
            ],
            '2026-03-31': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:35', delay: 25 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:30', delay: 20 }
            ],
            '2026-04-02': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:15', delay: 5 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:25', delay: 15 }
            ],
            '2026-04-04': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:40', delay: 30 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:18', delay: 8 }
            ],
            '2026-04-06': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:25', delay: 15 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:22', delay: 12 }
            ],
            '2026-04-08': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:20', delay: 10 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:15', delay: 5 }
            ],
            '2026-04-09': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:15', delay: 5 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:12', delay: 2 }
            ],
            '2026-04-10': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:12', delay: 2 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:10', delay: 0 }
            ],
            '2026-04-11': [
                { flight: 'EY461', route: 'MEL→AUH', status: 'flew', time: '17:10', delay: 0 },
                { flight: 'EY111', route: 'AUH→BCN', status: 'flew', time: '02:10', delay: 0 }
            ]
        };

        function App() {
            const [modal, setModal] = useState(null);

            const start = new Date('2026-02-26');
            const end = new Date('2026-05-02');

            const days = [];
            let current = new Date(start);
            while (current <= end) {
                const dateStr = current.toISOString().split('T')[0];
                days.push({
                    date: new Date(current),
                    dateStr,
                    flights: FLIGHTS[dateStr] || []
                });
                current.setDate(current.getDate() + 1);
            }

            const firstDay = days[0].date.getDay();
            const padded = [...Array(firstDay).fill(null), ...days];

            // Calculate stats
            let ey461Flew = 0, ey461Canc = 0, ey111Flew = 0, ey111Canc = 0;
            Object.values(FLIGHTS).forEach(dayFlights => {
                dayFlights.forEach(f => {
                    if (f.flight === 'EY461') {
                        if (f.status === 'flew') ey461Flew++;
                        else if (f.status === 'cancelled') ey461Canc++;
                    } else if (f.flight === 'EY111') {
                        if (f.status === 'flew') ey111Flew++;
                        else if (f.status === 'cancelled') ey111Canc++;
                    }
                });
            });

            const ey461Rate = Math.round((ey461Flew / (ey461Flew + ey461Canc)) * 100);
            const ey111Rate = Math.round((ey111Flew / (ey111Flew + ey111Canc)) * 100);

            return (
                <div className="max-w-7xl mx-auto">
                    <div className="bg-white dark:bg-gray-900 rounded-xl shadow-2xl p-6 mb-6">
                        <h1 className="text-4xl font-bold text-gray-900 dark:text-white mb-2">
                            Cat's Etihad Flights - 2026 Conflict Impact
                        </h1>
                        <p className="text-gray-600 dark:text-gray-400 mb-6">
                            Feb 28: War | Mar 1: AUH Struck | Mar 6: Resume | Apr 8: Ceasefire | May 1-2: Cat's Travel
                        </p>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            <div className="bg-green-50 dark:bg-green-950 border-2 border-green-600 rounded-lg p-3">
                                <div className="text-xs text-gray-600 dark:text-gray-400">EY461 Operated</div>
                                <div className="text-2xl font-bold text-green-600">{ey461Flew}</div>
                            </div>
                            <div className="bg-red-50 dark:bg-red-950 border-2 border-red-600 rounded-lg p-3">
                                <div className="text-xs text-gray-600 dark:text-gray-400">EY461 Cancelled</div>
                                <div className="text-2xl font-bold text-red-600">{ey461Canc}</div>
                            </div>
                            <div className="bg-green-50 dark:bg-green-950 border-2 border-green-600 rounded-lg p-3">
                                <div className="text-xs text-gray-600 dark:text-gray-400">EY111 Operated</div>
                                <div className="text-2xl font-bold text-green-600">{ey111Flew}</div>
                            </div>
                            <div className="bg-red-50 dark:bg-red-950 border-2 border-red-600 rounded-lg p-3">
                                <div className="text-xs text-gray-600 dark:text-gray-400">EY111 Cancelled</div>
                                <div className="text-2xl font-bold text-red-600">{ey111Canc}</div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <div className="bg-blue-50 dark:bg-blue-950 border-2 border-blue-600 rounded-lg p-4">
                                <div className="text-sm text-gray-600 dark:text-gray-400">EY461 Reliability</div>
                                <div className="text-3xl font-bold text-blue-600">{ey461Rate}%</div>
                                <div className="text-xs text-gray-500">MEL → AUH (May 1)</div>
                            </div>
                            <div className="bg-blue-50 dark:bg-blue-950 border-2 border-blue-600 rounded-lg p-4">
                                <div className="text-sm text-gray-600 dark:text-gray-400">EY111 Reliability</div>
                                <div className="text-3xl font-bold text-blue-600">{ey111Rate}%</div>
                                <div className="text-xs text-gray-500">AUH → BCN (May 2)</div>
                            </div>
                        </div>

                        {/* Calendar */}
                        <div className="grid grid-cols-7 gap-1 text-center mb-2">
                            {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => (
                                <div key={d} className="text-sm font-bold text-gray-600 dark:text-gray-400 py-2">{d}</div>
                            ))}
                        </div>

                        <div className="grid grid-cols-7 gap-2">
                            {padded.map((day, idx) => {
                                if (!day) return <div key={`pad-${idx}`} />;

                                const isCat = day.dateStr === '2026-05-01' || day.dateStr === '2026-05-02';
                                const ey461 = day.flights.find(f => f.flight === 'EY461');
                                const ey111 = day.flights.find(f => f.flight === 'EY111');

                                return (
                                    <div
                                        key={day.dateStr}
                                        className={`border-2 rounded-lg p-2 min-h-[140px] bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 ${
                                            isCat ? 'ring-4 ring-purple-600 shadow-xl' : ''
                                        }`}
                                    >
                                        <div className="flex justify-between items-start mb-2">
                                            <div className="text-lg font-bold text-gray-900 dark:text-white">
                                                {day.date.getDate()}
                                            </div>
                                            {isCat && <div className="text-2xl">⭐</div>}
                                        </div>

                                        {ey461 && (
                                            <div
                                                className={`mb-2 p-1 rounded ${
                                                    ey461.status === 'flew' ? 'bg-green-100 dark:bg-green-900' : 'bg-red-100 dark:bg-red-900 cursor-pointer hover:bg-red-200 dark:hover:bg-red-800'
                                                }`}
                                                onClick={() => ey461.status === 'cancelled' && CANCELLATION_REASONS[day.dateStr] && setModal({
                                                    flight: 'EY461',
                                                    date: day.dateStr,
                                                    reason: CANCELLATION_REASONS[day.dateStr]
                                                })}
                                            >
                                                <div className="text-xs font-bold text-gray-900 dark:text-white">EY461</div>
                                                <div className={`text-xs font-bold ${
                                                    ey461.status === 'flew' ? 'text-green-700 dark:text-green-300' : 'text-red-700 dark:text-red-300'
                                                }`}>
                                                    {ey461.status === 'flew' ? 'FLEW' : 'CANC'}
                                                </div>
                                                {ey461.time && (
                                                    <>
                                                        <div className="text-xs font-mono font-bold text-gray-900 dark:text-white">{ey461.time}</div>
                                                        {ey461.delay > 0 && (
                                                            <div className="text-xs text-orange-600 font-semibold">+{ey461.delay}m</div>
                                                        )}
                                                    </>
                                                )}
                                                {ey461.status === 'cancelled' && CANCELLATION_REASONS[day.dateStr] && (
                                                    <div className="text-xs text-red-600 dark:text-red-400 mt-1">Click for details</div>
                                                )}
                                            </div>
                                        )}

                                        {ey111 && (
                                            <div
                                                className={`p-1 rounded ${
                                                    ey111.status === 'flew' ? 'bg-green-100 dark:bg-green-900' : 'bg-red-100 dark:bg-red-900 cursor-pointer hover:bg-red-200 dark:hover:bg-red-800'
                                                }`}
                                                onClick={() => ey111.status === 'cancelled' && CANCELLATION_REASONS[day.dateStr] && setModal({
                                                    flight: 'EY111',
                                                    date: day.dateStr,
                                                    reason: CANCELLATION_REASONS[day.dateStr]
                                                })}
                                            >
                                                <div className="text-xs font-bold text-gray-900 dark:text-white">EY111</div>
                                                <div className={`text-xs font-bold ${
                                                    ey111.status === 'flew' ? 'text-green-700 dark:text-green-300' : 'text-red-700 dark:text-red-300'
                                                }`}>
                                                    {ey111.status === 'flew' ? 'FLEW' : 'CANC'}
                                                </div>
                                                {ey111.time && (
                                                    <>
                                                        <div className="text-xs font-mono font-bold text-gray-900 dark:text-white">{ey111.time}</div>
                                                        {ey111.delay > 0 && (
                                                            <div className="text-xs text-orange-600 font-semibold">+{ey111.delay}m</div>
                                                        )}
                                                    </>
                                                )}
                                                {ey111.status === 'cancelled' && CANCELLATION_REASONS[day.dateStr] && (
                                                    <div className="text-xs text-red-600 dark:text-red-400 mt-1">Click for details</div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Latest News */}
                    <div className="bg-white dark:bg-gray-900 rounded-xl shadow-2xl p-6 mt-6">
                        <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-4">
                            📰 Latest News & Updates
                        </h2>
                        <div className="space-y-4">
                            <div className="border-l-4 border-green-600 pl-4 py-2 bg-green-50 dark:bg-green-950/20">
                                <a
                                    href="https://loyaltylobby.com/2026/04/11/etihad-operates-85-passenger-flights-ex-abu-dhabi-this-sunday-april-12-2026/"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="text-blue-600 dark:text-blue-400 hover:underline font-semibold"
                                >
                                    Etihad Operates 85 Passenger Flights Ex-Abu Dhabi This Sunday (April 12, 2026)
                                </a>
                                <p className="text-sm text-gray-600 dark:text-gray-400 mt-1">
                                    <strong>LATEST - Apr 12, 2026:</strong> Operations increasing, 97 daily departures to ~80 destinations
                                </p>
                            </div>

                            <div className="border-l-4 border-blue-600 pl-4 py-2">
                                <a
                                    href="https://www.visahq.com/news/2026-04-08/ae/conditional-ceasefire-with-iran-raises-hopes-for-rapid-restoration-of-uae-air-connectivity/"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="text-blue-600 dark:text-blue-400 hover:underline font-semibold"
                                >
                                    Conditional ceasefire with Iran raises hopes for rapid restoration of UAE air connectivity
                                </a>
                                <p className="text-sm text-gray-600 dark:text-gray-400 mt-1">
                                    Apr 8, 2026 - Two-week ceasefire begins, capacity expected to climb from 40% to 70%
                                </p>
                            </div>

                            <div className="border-l-4 border-orange-600 pl-4 py-2">
                                <a
                                    href="https://blog.wego.com/etihad-airways-flight-cancellation-refunds-rebooking-and-what-to-do-next/"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="text-blue-600 dark:text-blue-400 hover:underline font-semibold"
                                >
                                    Etihad Airways Flight Cancellation 2026: Refunds, Rebooking, and What to Do Next
                                </a>
                                <p className="text-sm text-gray-600 dark:text-gray-400 mt-1">
                                    Passenger support info - Full refunds or free rebooking available for disrupted flights
                                </p>
                            </div>

                            <div className="border-l-4 border-red-600 pl-4 py-2">
                                <a
                                    href="https://www.agbi.com/aviation/2026/03/etihad-begins-restoring-services-after-airspace-shutdown/"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="text-blue-600 dark:text-blue-400 hover:underline font-semibold"
                                >
                                    Etihad restoring services following airspace closure due to Iran conflict
                                </a>
                                <p className="text-sm text-gray-600 dark:text-gray-400 mt-1">
                                    Bahrain, Kuwait routes suspended - airports damaged. Qatar airspace heavily restricted
                                </p>
                            </div>

                            <div className="border-l-4 border-yellow-600 pl-4 py-2">
                                <a
                                    href="https://www.euronews.com/2026/03/02/iran-war-etihad-airways-resumes-some-flights-from-abu-dhabi"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="text-blue-600 dark:text-blue-400 hover:underline font-semibold"
                                >
                                    Iran war: UAE starts exceptional flights for stranded passengers
                                </a>
                                <p className="text-sm text-gray-600 dark:text-gray-400 mt-1">
                                    Mar 2, 2026 - First flight (EY67 to London) departed AUH at 2:39pm after airspace reopened
                                </p>
                            </div>

                            <div className="border-l-4 border-gray-600 pl-4 py-2">
                                <a
                                    href="https://en.wikipedia.org/wiki/2026_Iranian_strikes_on_the_United_Arab_Emirates"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="text-blue-600 dark:text-blue-400 hover:underline font-semibold"
                                >
                                    2026 Iranian strikes on the United Arab Emirates - Full Timeline
                                </a>
                                <p className="text-sm text-gray-600 dark:text-gray-400 mt-1">
                                    438 ballistic missiles, 2,012 drones, 19 cruise missiles fired at UAE (as of Apr 1)
                                </p>
                            </div>
                        </div>

                        <div className="mt-4 p-4 bg-yellow-50 dark:bg-yellow-900/20 rounded-lg border border-yellow-300 dark:border-yellow-700">
                            <p className="text-sm text-gray-700 dark:text-gray-300">
                                <strong>⚠️ Current Status:</strong> Ceasefire active since Apr 8. Operations at ~60% capacity.
                                Etihad passengers with tickets before Feb 28 can rebook free through Jun 15, 2026.
                            </p>
                        </div>
                    </div>

                    {/* Cancellation Details Modal */}
                    {modal && (
                        <div
                            className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"
                            onClick={() => setModal(null)}
                        >
                            <div
                                className="bg-white dark:bg-gray-900 rounded-xl shadow-2xl p-6 max-w-lg"
                                onClick={e => e.stopPropagation()}
                            >
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h2 className="text-2xl font-bold text-gray-900 dark:text-white">
                                            {modal.flight} Cancellation
                                        </h2>
                                        <p className="text-gray-600 dark:text-gray-400">
                                            {new Date(modal.date).toLocaleDateString('en-US', {
                                                weekday: 'long',
                                                year: 'numeric',
                                                month: 'long',
                                                day: 'numeric'
                                            })}
                                        </p>
                                    </div>
                                    <button
                                        onClick={() => setModal(null)}
                                        className="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-2xl"
                                    >
                                        ×
                                    </button>
                                </div>

                                <div className="bg-red-50 dark:bg-red-950 border-l-4 border-red-600 p-4 rounded">
                                    <p className="text-gray-900 dark:text-white font-semibold mb-2">
                                        Reason for Cancellation:
                                    </p>
                                    <p className="text-gray-700 dark:text-gray-300">
                                        {modal.reason}
                                    </p>
                                </div>

                                <button
                                    onClick={() => setModal(null)}
                                    className="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
